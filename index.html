<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonkeeper Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f5f7; /* Светлая тема как в Tonkeeper */
            font-family: 'Inter', sans-serif;
        }
        .app-container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-col;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .action-btn {
            background: #007aff; /* Фирменный синий TON */
            border-radius: 16px;
        }
        .asset-card {
            transition: transform 0.1s;
        }
        .asset-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="app-container w-full relative overflow-hidden flex flex-col">
        
        <header class="p-6 text-center">
            <div class="flex justify-between items-center mb-6">
                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center">⚙️</div>
                <div class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-semibold">Wallet 1 ▾</div>
                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center">🔍</div>
            </div>
            
            <h2 class="text-gray-500 text-sm font-medium">Ваш баланс</h2>
            <h1 class="text-4xl font-bold mt-1">$ 1,240.50</h1>
            <p class="text-green-500 text-sm font-medium mt-1">+ $12.30 (1.1%)</p>
        </header>

        <div class="flex justify-around px-6 mb-8">
            <div class="flex flex-col items-center gap-2">
                <button class="action-btn w-14 h-14 flex items-center justify-center text-2xl text-white">↑</button>
                <span class="text-xs font-medium">Отправить</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <button class="action-btn w-14 h-14 flex items-center justify-center text-2xl text-white">↓</button>
                <span class="text-xs font-medium">Получить</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <button class="action-btn w-14 h-14 flex items-center justify-center text-2xl text-white">⇆</button>
                <span class="text-xs font-medium">Обмен</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <button class="action-btn w-14 h-14 flex items-center justify-center text-2xl text-white">➕</button>
                <span class="text-xs font-medium">Купить</span>
            </div>
        </div>

        <section class="flex-1 bg-gray-50 rounded-t-[32px] p-6 space-y-4 shadow-inner">
            <div class="flex justify-between items-center text-xs text-gray-400 font-bold uppercase tracking-wider mb-2">
                <span>Активы</span>
                <span>Настроить</span>
            </div>

            <div class="asset-card flex items-center justify-between bg-white p-4 rounded-2xl shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">💎</div>
                    <div>
                        <p class="font-bold">Toncoin</p>
                        <p class="text-xs text-gray-500">$5.42</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-bold">150.5 TON</p>
                    <p class="text-xs text-gray-500">$815.71</p>
                </div>
            </div>

            <div class="asset-card flex items-center justify-between bg-white p-4 rounded-2xl shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center text-white font-bold">₮</div>
                    <div>
                        <p class="font-bold">Tether</p>
                        <p class="text-xs text-gray-500">USD₮</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-bold">424.79</p>
                    <p class="text-xs text-gray-500">$424.79</p>
                </div>
            </div>
        </section>

        <nav class="h-20 bg-white border-t border-gray-100 flex items-center justify-around px-4">
            <div class="flex flex-col items-center text-blue-600">
                <span class="text-xl">💎</span>
                <span class="text-[10px] font-bold">Кошелек</span>
            </div>
            <div class="flex flex-col items-center text-gray-400">
                <span class="text-xl">🧭</span>
                <span class="text-[10px] font-bold">Браузер</span>
            </div>
            <div class="flex flex-col items-center text-gray-400">
                <span class="text-xl">🔄</span>
                <span class="text-[10px] font-bold">Стейкинг</span>
            </div>
            <div class="flex flex-col items-center text-gray-400">
                <span class="text-xl">📜</span>
                <span class="text-[10px] font-bold">История</span>
            </div>
        </nav>
    </div>

</body>
</html>
