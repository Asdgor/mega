<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonkeeper Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-container { max-width: 400px; margin: 0 auto; height: 100vh; position: relative; display: flex; flex-col; }
        
        /* Модалки и меню */
        .modal { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; backdrop-filter: blur(10px); }
        .side-menu { position: absolute; left: -100%; top: 0; width: 80%; height: 100%; background: #1c1c1e; z-index: 150; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 24px; border-right: 1px solid #333; }
        .side-menu.active { left: 0; }
        
        .modal-content { position: absolute; bottom: 0; width: 100%; border-radius: 30px 30px 0 0; padding: 24px; background: #1c1c1e; }
        
        .ton-blue { background-color: #3b82f6; } /* Чуть сочнее синий */
        .bg-card { background-color: #1c1c1e; }
        
        .hidden { display: none !important; }
        .active-screen { display: flex !important; }
        
        button:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="app-container w-full shadow-2xl overflow-hidden relative">
        
        <div id="side-menu" class="side-menu">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black">Settings</h2>
                <button onclick="toggleProfile()" class="text-2xl">✕</button>
            </div>
            <div class="space-y-4">
                <div class="p-4 bg-white/5 rounded-2xl flex items-center justify-between">
                    <span>Dark Mode</span>
                    <div class="w-10 h-5 bg-blue-600 rounded-full relative"><div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div></div>
                </div>
                <div class="p-4 bg-white/5 rounded-2xl">Currency: USD</div>
                <div class="p-4 bg-white/5 rounded-2xl">Language: English</div>
                <div class="p-4 bg-red-500/20 text-red-500 rounded-2xl font-bold mt-10 text-center">Logout</div>
            </div>
        </div>

        <div id="wallet-screen" class="flex flex-col h-full w-full p-6 active-screen">
            <header class="text-center pt-4">
                <div class="flex justify-between items-center mb-10">
                    <button onclick="toggleProfile()" class="w-11 h-11 rounded-full bg-card flex items-center justify-center border border-white/5">
                        <span class="text-blue-400 text-lg">👤</span>
                    </button>
                    <div class="font-extrabold text-sm uppercase tracking-[0.2em] opacity-90">Wallet</div>
                    <button onclick="alert('Search clicked')" class="w-11 h-11 rounded-full bg-card flex items-center justify-center border border-white/5">
                        <span class="text-lg">🔍</span>
                    </button>
                </div>

                <p class="opacity-40 text-[10px] font-black uppercase tracking-[0.15em] mb-2">Total Balance</p>
                <h1 class="text-[44px] font-black tracking-tighter mb-10">$ <span id="main-balance">2,313.24</span></h1>
                
                <div class="flex justify-center gap-10 mb-12">
                    <button onclick="openModal('send-modal')" class="flex flex-col items-center gap-3">
                        <div class="ton-blue w-[70px] h-[70px] rounded-[24px] flex items-center justify-center text-white text-3xl shadow-lg">↑</div>
                        <span class="text-[11px] font-bold uppercase opacity-50 tracking-wider">Send</span>
                    </button>
                    <button onclick="openP2P()" class="flex flex-col items-center gap-3">
                        <div class="ton-blue w-[70px] h-[70px] rounded-[24px] flex items-center justify-center text-white text-3xl shadow-lg">⇆</div>
                        <span class="text-[11px] font-bold uppercase opacity-50 tracking-wider">P2P</span>
                    </button>
                </div>
            </header>

            <main class="flex-1">
                <p class="text-[10px] font-black opacity-30 uppercase tracking-[0.15em] mb-6">Your Assets</p>
                <div class="flex items-center justify-between p-1">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg">💎</div>
                        <div>
                            <p class="font-bold text-base">Toncoin</p>
                            <p class="text-[11px] opacity-40">$5.42</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-xl tracking-tight"><span id="ton-count">477,5</span> TON</p>
                    </div>
                </div>
            </main>
        </div>

        <div id="p2p-screen" class="hidden absolute inset-0 bg-black z-50 flex flex-col">
            <div class="p-6 border-b border-white/5">
                <header class="flex items-center gap-4 mb-6">
                    <button onclick="closeP2P()" class="text-3xl">←</button>
                    <h1 class="text-2xl font-black">P2P Market</h1>
                </header>
                <div class="flex gap-6">
                    <button class="pb-2 border-b-2 border-blue-500 font-bold">Buy</button>
                    <button class="pb-2 opacity-30 font-bold">Sell</button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-4">
                <div class="p-5 bg-card rounded-[28px] border border-white/5">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-bold text-blue-400">Merchant_God</span>
                        <span class="text-[10px] opacity-30">5000+ trades</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-3xl font-black italic">502.40 ₽</p>
                            <p class="text-[10px] opacity-30 mt-1">Limit: 100 - ∞ ₽</p>
                        </div>
                        <button onclick="startOrder()" class="bg-green-500 text-white px-8 py-3 rounded-2xl font-black text-sm">BUY</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="card-verify-modal" class="modal">
            <div class="modal-content">
                <div class="text-center mb-6">
                    <div class="text-4xl mb-2">🔒</div>
                    <h2 class="text-xl font-black">Security Code</h2>
                    <p class="text-xs opacity-40">Enter code for unlimited card</p>
                </div>
                <input id="pin-input" type="password" maxlength="6" placeholder="••••••" class="w-full p-5 rounded-2xl text-center text-3xl tracking-[1em] mb-6 outline-none bg-black border border-white/10">
                <button onclick="confirmPurchase()" class="w-full ton-blue py-5 rounded-2xl font-black text-xl">CONFIRM</button>
                <button onclick="closeModal('card-verify-modal')" class="w-full mt-4 opacity-30 text-xs">Cancel</button>
            </div>
        </div>

        <div id="send-modal" class="modal">
            <div class="modal-content">
                <h2 class="text-xl font-black mb-6">Send TON</h2>
                <input id="send-addr" type="text" placeholder="Address" class="w-full p-4 rounded-xl mb-3 bg-black border border-white/10 outline-none">
                <input id="send-val" type="number" placeholder="Amount" class="w-full p-4 rounded-xl mb-6 bg-black border border-white/10 outline-none">
                <button onclick="executeSend()" class="w-full ton-blue py-4 rounded-2xl font-black">Send Now</button>
                <button onclick="closeModal('send-modal')" class="w-full mt-4 opacity-30">Cancel</button>
            </div>
        </div>

    </div>

    <script>
        let balance = 2313.24;
        let tonCount = 477.5;

        // Кнопка профиля (выезжает сбоку)
        function toggleProfile() {
            document.getElementById('side-menu').classList.toggle('active');
        }

        function openP2P() { document.getElementById('p2p-screen').classList.remove('hidden'); }
        function closeP2P() { document.getElementById('p2p-screen').classList.add('hidden'); }
        
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function startOrder() { openModal('card-verify-modal'); }

        function confirmPurchase() {
            if (document.getElementById('pin-input').value === "585823") {
                tonCount += 100;
                balance += 542.00;
                updateUI();
                alert("Success! +100 TON");
                closeModal('card-verify-modal');
                closeP2P();
            } else { alert("Wrong PIN"); }
            document.getElementById('pin-input').value = "";
        }

        function executeSend() {
            const v = parseFloat(document.getElementById('send-val').value);
            if (v <= tonCount) {
                tonCount -= v;
                balance -= (v * 5.42);
                updateUI();
                alert("Sent!");
                closeModal('send-modal');
            } else { alert("No money!"); }
        }

        function updateUI() {
            document.getElementById('main-balance').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            document.getElementById('ton-count').innerText = tonCount.toLocaleString('ru-RU').replace('.', ',');
        }
    </script>
</body>
</html>
