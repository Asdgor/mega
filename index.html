<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonkeeper P2P Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f5f7; font-family: 'Inter', sans-serif; }
        .app-container { max-width: 400px; margin: 0 auto; background: white; min-height: 100vh; position: relative; }
        .ton-blue { background-color: #007aff; }
        .modal { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; }
        .modal-content { position: absolute; bottom: 0; width: 100%; background: white; border-radius: 24px 24px 0 0; padding: 24px; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="app-container w-full flex flex-col shadow-2xl overflow-hidden">
        
        <div id="wallet-screen">
            <header class="p-6 text-center">
                <div class="flex justify-between items-center mb-6">
                    <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center cursor-pointer">⚙️</div>
                    <div class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider">Demo Wallet</div>
                    <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center cursor-pointer">🔍</div>
                </div>
                <h2 class="text-gray-500 text-sm">Мой баланс</h2>
                <h1 class="text-4xl font-bold mt-1 tracking-tight">$ <span id="main-balance">1240.50</span></h1>
            </header>

            <div class="flex justify-around px-6 mb-8">
                <button onclick="alert('Функция в разработке')" class="flex flex-col items-center gap-2">
                    <div class="ton-blue w-14 h-14 rounded-2xl flex items-center justify-center text-white text-xl shadow-lg">↑</div>
                    <span class="text-xs font-semibold">Отправить</span>
                </button>
                <button onclick="openP2P()" class="flex flex-col items-center gap-2">
                    <div class="ton-blue w-14 h-14 rounded-2xl flex items-center justify-center text-white text-xl shadow-lg">⇆</div>
                    <span class="text-xs font-semibold">P2P Маркет</span>
                </button>
            </div>

            <section class="bg-gray-50 rounded-t-[32px] p-6 min-h-[400px]">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-4">Твои активы</p>
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white">💎</div>
                        <div><p class="font-bold text-sm">Toncoin</p><p class="text-xs text-gray-400">$5.42</p></div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm"><span id="ton-count">150.5</span> TON</p>
                    </div>
                </div>
            </section>
        </div>

        <div id="p2p-screen" class="hidden flex flex-col h-full bg-white absolute inset-0 z-10">
            <header class="p-4 flex items-center gap-4 border-b">
                <button onclick="closeP2P()" class="text-2xl">←</button>
                <h1 class="text-xl font-bold">P2P Маркет</h1>
            </header>
            
            <div class="flex p-4 gap-2">
                <button class="flex-1 py-2 bg-gray-100 rounded-xl font-bold text-sm text-blue-600 border-2 border-blue-600">Купить</button>
                <button class="flex-1 py-2 bg-gray-100 rounded-xl font-bold text-sm text-gray-500">Продать</button>
            </div>

            <div class="flex-1 overflow-y-auto px-4 space-y-3">
                <div class="border border-gray-100 p-4 rounded-2xl shadow-sm">
                    <div class="flex justify-between mb-2">
                        <span class="font-bold text-blue-600">CryptoKing 👑</span>
                        <span class="text-xs text-gray-400">1420 сделок</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-2xl font-bold">502.40 ₽</p>
                            <p class="text-xs text-gray-500">Лимит: 500 - 50 000 ₽</p>
                        </div>
                        <button onclick="openDeal(502.40, 'CryptoKing')" class="bg-green-500 text-white px-6 py-2 rounded-xl font-bold text-sm">Купить</button>
                    </div>
                </div>
                <div class="border border-gray-100 p-4 rounded-2xl shadow-sm">
                    <div class="flex justify-between mb-2">
                        <span class="font-bold text-blue-600">TonMaster</span>
                        <span class="text-xs text-gray-400">89 сделок</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-2xl font-bold">505.10 ₽</p>
                            <p class="text-xs text-gray-500">Лимит: 1000 - 100 000 ₽</p>
                        </div>
                        <button onclick="openDeal(505.10, 'TonMaster')" class="bg-green-500 text-white px-6 py-2 rounded-xl font-bold text-sm">Купить</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="deal-modal" class="modal">
            <div class="modal-content">
                <h3 class="text-xl font-bold mb-2">Покупка TON</h3>
                <p class="text-sm text-gray-500 mb-4">Продавец: <span id="seller-name" class="text-blue-600 font-bold"></span></p>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400">Сумма в рублях</label>
                        <input id="buy-amount" type="number" placeholder="Сколько отдаете?" class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-blue-500 text-lg font-bold">
                    </div>
                    <button onclick="processTrade()" class="w-full ton-blue text-white py-4 rounded-2xl font-bold text-lg">Подтвердить покупку</button>
                    <button onclick="closeDeal()" class="w-full text-gray-400 py-2 font-semibold">Отмена</button>
                </div>
            </div>
        </div>

        <nav class="h-20 bg-white border-t flex items-center justify-around z-0">
            <div onclick="closeP2P()" class="flex flex-col items-center cursor-pointer">
                <span class="text-xl">💎</span><span class="text-[10px]">Кошелек</span>
            </div>
            <div class="flex flex-col items-center text-gray-300">
                <span class="text-xl">🧭</span><span class="text-[10px]">Браузер</span>
            </div>
            <div class="flex flex-col items-center text-gray-300">
                <span class="text-xl">📜</span><span class="text-[10px]">История</span>
            </div>
        </nav>
    </div>

    <script>
        let balance = 1240.50;
        let tonCount = 150.5;
        let currentPrice = 0;

        function openP2P() {
            document.getElementById('p2p-screen').classList.remove('hidden');
        }

        function closeP2P() {
            document.getElementById('p2p-screen').classList.add('hidden');
        }

        function openDeal(price, name) {
            currentPrice = price;
            document.getElementById('seller-name').innerText = name;
            document.getElementById('deal-modal').style.display = 'block';
        }

        function closeDeal() {
            document.getElementById('deal-modal').style.display = 'none';
        }

        function processTrade() {
            const amountRub = parseFloat(document.getElementById('buy-amount').value);
            if (isNaN(amountRub) || amountRub <= 0) {
                alert("Введите нормальную сумму");
                return;
            }

            // Имитация покупки: 1 TON допустим стоит 500 рублей
            // Мы просто добавим немного TON на баланс для вида
            const boughtTon = (amountRub / currentPrice).toFixed(2);
            const costUsd = (amountRub / 92).toFixed(2); // Грубый перевод в USD для баланса

            tonCount = (parseFloat(tonCount) + parseFloat(boughtTon)).toFixed(2);
            balance = (parseFloat(balance) + parseFloat(costUsd)).toFixed(2);

            // Обновляем UI
            document.getElementById('ton-count').innerText = tonCount;
            document.getElementById('main-balance').innerText = balance;

            alert(`Успех! Вы купили ${boughtTon} TON`);
            closeDeal();
            closeP2P();
        }
    </script>
</body>
</html>
