<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tonkeeper Bento Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0c0e11; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden; 
        }
        .app-container { max-width: 400px; margin: 0 auto; height: 100vh; position: relative; display: flex; flex-direction: column; }
        .bg-bento { background-color: #171a1f; }
        .bg-action { background-color: #2c3138; }
        .text-bento { color: #8e959f; }
        .ton-blue { background-color: #007aff; }

        /* Нижний навигационный блок */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 80px; background-color: #0c0e11; border-top: 1px solid #1a1e23; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .bottom-nav button { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #5c626e; text-decoration: none; }
        .bottom-nav button.active { color: #007aff; }
        .bottom-nav svg { width: 22px; height: 22px; transition: color 0.2s; }

        button:active { transform: scale(0.96); transition: 0.1s; }
        .scroller::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="app-container w-full relative">
        
        <header class="p-6 text-center z-10">
            <div class="flex justify-between items-center mb-10">
                <button class="w-11 h-11 rounded-full bg-bento flex items-center justify-center text-xl">👤</button>
                <button class="bg-bento rounded-full px-4 py-2 flex items-center gap-1.5 shadow-md">
                    <span class="text-xs font-semibold tracking-wider">WALLET</span>
                    <span class="text-[9px] opacity-40">▼</span>
                </button>
                <button class="w-11 h-11 rounded-full bg-bento flex items-center justify-center text-lg">🔍</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto scroller px-6 pb-[100px]">
            
            <div class="text-center mb-10">
                <p class="text-[10px] font-black uppercase tracking-[0.15em] opacity-40 mb-2">Total Balance</p>
                <h1 class="text-[48px] font-black tracking-tighter mb-8">$ <span id="main-balance">2,313.24</span></h1>
                <div class="flex justify-center gap-8 mb-10">
                    <button class="w-[72px] h-[72px] rounded-[24px] bg-action flex items-center justify-center text-3xl shadow-lg">↑</button>
                    <button class="w-[72px] h-[72px] rounded-[24px] bg-action flex items-center justify-center text-3xl shadow-lg">⇆</button>
                    <button class="w-[72px] h-[72px] rounded-[24px] bg-action flex items-center justify-center text-3xl shadow-lg">🔄</button>
                </div>
                <button class="text-[11px] font-bold text-blue-500 uppercase tracking-wider bg-blue-500/10 px-4 py-1.5 rounded-full shadow">ПОПОЛНИТЬ</button>
            </div>

            <section class="mb-10">
                <p class="text-[10px] font-black opacity-30 uppercase tracking-[0.15em] mb-4">Your Assets</p>
                <div class="bg-bento rounded-[32px] p-6 space-y-4 shadow-inner border border-white/5">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-xl shadow-lg">💎</div>
                            <div>
                                <p class="font-bold text-base">Toncoin</p>
                                <p class="text-[11px] opacity-40">$5.42</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-xl tracking-tight"><span id="ton-count">477,5</span> TON</p>
                        </div>
                    </div>
                </div>
            </section>

            <div class="bg-bento rounded-[32px] p-6 mb-10 border border-white/5 shadow-inner">
                <p class="text-[10px] font-black opacity-30 uppercase tracking-[0.15em] mb-4">Complete Setup</p>
                <button class="w-full text-left flex items-center justify-between gap-4 p-4 bg-white/5 rounded-2xl active:bg-white/10">
                    <div class="flex items-center gap-3">
                        <div class="text-3xl text-blue-400">🔑</div>
                        <div><p class="font-bold text-sm">Save your secret key</p><p class="text-[10px] opacity-40 mt-1">Recovery is impossible without the key</p></div>
                    </div>
                    <span class="text-bento text-xs">▼</span>
                </button>
            </div>

        </main>

        <nav class="bottom-nav">
            <button class="active">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M4 11.1c.3 0 .6-.1.8-.3L11.2 4c.4-.4 1.1-.4 1.5 0L19 10.8c.2.2.5.3.8.3.6 0 1-.4 1-1 0-.3-.1-.5-.3-.7L13.5 2.2C12.7 1.4 11.3 1.4 10.5 2.2L3.3 9.1c-.2.2-.3.4-.3.7 0 .6.4 1 1 1.1zm1 1h14c1.1 0 2 .9 2 2v6c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2v-6c0-1.1.9-2 2-2z"/></svg>
                <span class="text-[9px] font-bold uppercase tracking-wider">Кошелёк</span>
            </button>
            <button onclick="alert('История')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l.8-4.73L5.13 9.92l4.74-.69L12 4.9l2.13 4.32 4.74.69-3.44 3.35.8 4.74z"/></svg>
                <span class="text-[9px] font-bold uppercase tracking-wider">История</span>
            </button>
            <button onclick="alert('Swap')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.47 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14.5c0 .28-.22.5-.5.5s-.5-.22-.5-.5V14h-2.5c-.28 0-.5-.22-.5-.5s.22-.5.5-.5H11v-1.5h-.5c-.28 0-.5-.22-.5-.5s.22-.5.5-.5h2.5c.28 0 .5.22.5.5s-.22.5-.5.5H12V13h1.5c.28 0 .5.22.5.5s-.22.5-.5.5H13v1.5h.5c.28 0 .5.22.5.5s-.22.5-.5.5zm1.5-6.5h-5c-.28 0-.5-.22-.5-.5s.22-.5.5-.5h5c.28 0 .5.22.5.5s-.22.5-.5.5z"/></svg>
                <span class="text-[9px] font-bold uppercase tracking-wider">Браузер</span>
            </button>
            <button onclick="alert('Настройки')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.47 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 16h-2v-2h2v2zm0-4h-2v-2c0-.55.45-1 1-1s1 .45 1 1v2zm0-4h-2v-2c0-.55.45-1 1-1s1 .45 1 1v2zm0-4h-2V6c0-.55.45-1 1-1s1 .45 1 1v2z"/></svg>
                <span class="text-[9px] font-bold uppercase tracking-wider">Ещё</span>
            </button>
        </nav>

    </div>

</body>
</html>
